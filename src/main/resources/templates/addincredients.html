<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRestaurant · recipe builder</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f5fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    /* animated orbs (same family) */
    body::before {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 30% 30%, #2ecc71, #1abc9c);
      top: -60px;
      left: -60px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      animation: orbMove 16s infinite alternate;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at 70% 80%, #e67e22, #f39c12);
      bottom: -80px;
      right: -70px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.2;
      animation: orbMove2 20s infinite alternate;
      z-index: 0;
    }

    @keyframes orbMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.3); }
    }
    @keyframes orbMove2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-70px, -20px) scale(1.4); }
    }

    /* main card */
    .recipe-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 70px 24px 70px 24px;
      box-shadow: 0 40px 70px -20px #00000080, 0 0 0 1px rgba(46, 204, 113, 0.3);
      width: 100%;
      max-width: 850px;
      z-index: 10;
      position: relative;
      overflow: hidden;
      animation: cardGlide 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
      padding: 0;
      border: 1px solid rgba(46, 204, 113, 0.4);
    }

    @keyframes cardGlide {
      0% { opacity: 0; transform: scale(0.94) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* header with back + title */
    .recipe-header {
      background: linear-gradient(105deg, #1b3b2b, #0f2c1f);
      padding: 28px 35px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 2px solid #f1c40f;
    }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid #f1c40f;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 10px 25px 10px 18px;
      border-radius: 50px 12px 50px 12px;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    .back-btn i {
      font-size: 1.3rem;
      color: #f1c40f;
    }

    .back-btn:hover {
      background: #f1c40f;
      border-color: white;
      transform: translateX(-5px);
    }
    .back-btn:hover i {
      color: #0f2c1f;
    }

    .recipe-header h2 {
      color: white;
      font-size: 2.2rem;
      font-weight: 700;
      margin-left: auto;
      letter-spacing: -0.5px;
    }
    .recipe-header h2 i {
      color: #f1c40f;
      margin-right: 12px;
    }

    /* form container */
    .form-container {
      padding: 40px 45px 50px;
      background: #ffffffd9;
    }

    /* dish name (full width) */
    .dish-name-group {
      position: relative;
      margin-bottom: 30px;
    }
    .dish-name-group label {
      display: block;
      font-weight: 600;
      font-size: 1rem;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }
    .dish-name-group label i {
      color: #2ecc71;
      width: 24px;
      margin-right: 5px;
    }
    .dish-name-group input {
      width: 100%;
      padding: 16px 20px 16px 55px;
      border: 2px solid #e2e8f0;
      border-radius: 50px 14px 50px 14px;
      font-size: 1.1rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      transition: all 0.2s ease;
      outline: none;
    }
    .dish-name-icon {
      position: absolute;
      left: 22px;
      top: 50px;
      color: #2ecc71;
      font-size: 1.4rem;
      z-index: 2;
    }
    .dish-name-group input:focus {
      border-color: #2ecc71;
      box-shadow: 0 0 0 5px #2ecc7120;
    }

    /* ingredients panel title */
    .ingredients-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 25px 0 20px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f2c1f;
      border-left: 7px solid #f1c40f;
      padding-left: 15px;
    }
    .ingredients-title i {
      color: #e67e22;
    }

    /* ingredient row template (repeated) */
    .ingredient-row {
      display: grid;
      grid-template-columns: 1.2fr 0.6fr 0.8fr 0.5fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      background: #f9fbfe;
      padding: 12px 16px;
      border-radius: 60px 10px 60px 10px;
      border: 1px solid #dee7f0;
      transition: 0.15s;
    }
    .ingredient-row:hover {
      border-color: #2ecc71;
      background: #f0f9f0;
    }

    .ingredient-row input,
    .ingredient-row select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d9e6;
      border-radius: 30px 6px 30px 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      background: white;
      outline: none;
    }
    .ingredient-row input:focus,
    .ingredient-row select:focus {
      border-color: #2ecc71;
      box-shadow: 0 0 0 3px #2ecc7120;
    }

    .remove-ing {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 1.6rem;
      cursor: pointer;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.15s;
    }
    .remove-ing:hover {
      background: #ffe9e7;
      color: #c0392b;
      transform: scale(1.1);
    }

    .add-ingredient-btn {
      background: transparent;
      border: 2px dashed #2ecc71;
      color: #2ecc71;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 50px 10px 50px 10px;
      margin: 15px 0 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      transition: 0.2s;
    }
    .add-ingredient-btn:hover {
      background: #2ecc7110;
      border: 2px solid #2ecc71;
      transform: translateY(-2px);
    }

    /* instruction / notes field */
    .instruction-group {
      position: relative;
      margin-top: 25px;
    }
    .instruction-group label {
      font-weight: 600;
      color: #1e293b;
      display: block;
      margin-bottom: 8px;
    }
    .instruction-group label i {
      color: #f39c12;
      margin-right: 8px;
    }
    .instruction-group textarea {
      width: 100%;
      padding: 16px 20px 16px 52px;
      border: 2px solid #e2e8f0;
      border-radius: 50px 14px 50px 14px;
      font-family: 'Poppins', sans-serif;
      resize: vertical;
      min-height: 90px;
    }
    .instruction-group i {
      position: absolute;
      left: 20px;
      top: 55px;
      color: #f39c12;
      font-size: 1.3rem;
    }

    /* action row */
    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .clear-btn {
      background: transparent;
      border: 2px solid #cbd5e1;
      padding: 15px 35px;
      border-radius: 60px 12px 60px 12px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #334155;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .clear-btn:hover {
      background: #f1f5f9;
      border-color: #2ecc71;
      color: #2ecc71;
    }

    .save-recipe-btn {
      background: linear-gradient(135deg, #2ecc71, #1e8b4c);
      border: none;
      padding: 15px 50px;
      border-radius: 60px 12px 60px 12px;
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 20px 30px -10px #2ecc71;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .save-recipe-btn:hover {
      background: linear-gradient(145deg, #3be282, #1ba155);
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 28px 40px -8px #249e57;
    }
    .save-recipe-btn i {
      transition: transform 0.2s;
    }
    .save-recipe-btn:hover i {
      transform: translateX(5px);
    }

    /* small example hint */
    .example-hint {
      margin-top: 30px;
      background: #ebf7ee;
      border-radius: 40px 8px 40px 8px;
      padding: 16px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      border: 1px solid #f1c40f;
      color: #1e3a2f;
      font-size: 0.95rem;
    }
    .example-hint i {
      color: #e67e22;
      font-size: 1.3rem;
    }
    .example-hint span {
      font-weight: 700;
      color: #2ecc71;
    }

    @media (max-width: 700px) {
      .recipe-header { flex-direction: column; align-items: start; }
      .recipe-header h2 { margin-left: 0; }
      .form-container { padding: 25px 20px; }
      .ingredient-row { grid-template-columns: 1fr; gap: 10px; }
      .remove-ing { align-self: flex-end; }
    }
  </style>
</head>
<body>

  <div class="recipe-card">
    
    <!-- header with back button -->
    <div class="recipe-header">
      <button class="back-btn" onclick="window.location.href='/back'">
        <i class="fas fa-arrow-left"></i> Back
      </button>
      <h2><i class="fas fa-utensils"></i> Create Recipe</h2>
    </div>

    <!-- main form -->
    <div class="form-container">
      <form id="recipeForm" action="/saverecipe" method="post">

        <!-- dish name (like "chicken rice") -->
        <div class="dish-name-group">
          <label><i class="fas fa-egg"></i> Dish name *</label>
          <i class="fas fa-egg dish-name-icon"></i>
          <input type="text" name="dishName" placeholder="e.g. Chicken Rice, Nasi Lemak, Veg Burger" required>
        </div>

        <!-- ingredients section title -->
        <div class="ingredients-title">
          <i class="fas fa-carrot"></i> ingredients
        </div>

        <!-- ingredient list container (dynamic rows) -->
        <div id="ingredientsContainer">
          <!-- first ingredient row (example: rice) -->
          <div class="ingredient-row" id="row0">
            <input type="text" name="ingName[]" placeholder="Ingredient (rice, chicken...)" value="rice">
            <select name="ingUnit[]">
              <option value="kg">kg</option>
              <option value="g">g</option>
              <option value="L">L</option>
              <option value="ml">ml</option>
              <option value="pcs" selected>pcs</option>
              <option value="dozen">dozen</option>
              <option value="tbsp">tbsp</option>
              <option value="tsp">tsp</option>
            </select>
            <input type="number" name="ingQty[]" step="0.01" min="0" placeholder="Qty" value="0.5">
            <input type="text" name="ingNote[]" placeholder="note (optional)" value="basmati">
            <button type="button" class="remove-ing" onclick="removeIngredient(this)"><i class="fas fa-times-circle"></i></button>
          </div>
        </div>

        <!-- button to add more ingredients -->
        <button type="button" class="add-ingredient-btn" id="addIngBtn">
          <i class="fas fa-plus-circle"></i> Add another ingredient
        </button>

        <!-- preparation / notes field -->
        <div class="instruction-group">
          <label><i class="fas fa-clipboard-list"></i> Preparation / notes</label>
          <i class="fas fa-utensil-spoon"></i>
          <textarea name="preparationNotes" placeholder="e.g. marinate chicken with salt & oil, cook rice with 2 cups water ..."></textarea>
        </div>

        <!-- action row (clear & save) -->
        <div class="action-row">
          <button type="reset" class="clear-btn" onclick=" confirm('Reset all fields?');">
            <i class="fas fa-eraser"></i> Clear
          </button>
          <button type="submit" class="save-recipe-btn">
            <i class="fas fa-save"></i> Save Recipe
          </button>
        </div>

      </form>

      <!-- extra preview / helper with examples -->
      <div class="example-hint">
        <i class="fas fa-lightbulb"></i>
        <span>example – chicken rice:</span> rice 0.5 kg · chicken 300 g · carrot 1 pcs · capsicum 1 pcs · salt 2 tsp · oil 3 tbsp
      </div>
    </div>
  </div>

  <!-- tiny floating helper (consistent with stock page style) -->
  <div style="position: fixed; bottom: 20px; left: 20px; opacity:0.4;">
    <i class="fas fa-arrow-left" style="color: #2ecc71;"></i> back
  </div>

  <script>
    // dynamic ingredient rows
    let ingredientIndex = 1; // because we already have row0

    function addIngredientRow() {
      const container = document.getElementById('ingredientsContainer');
      const newRow = document.createElement('div');
      newRow.className = 'ingredient-row';
      newRow.id = 'row' + ingredientIndex;

      // ingredient name input
      const ingName = document.createElement('input');
      ingName.type = 'text';
      ingName.name = 'ingName[]';
      ingName.placeholder = 'Ingredient';
      ingName.value = '';   // empty by default

      // unit select
      const unitSelect = document.createElement('select');
      unitSelect.name = 'ingUnit[]';
      const units = ['kg','g','L','ml','pcs','dozen','tbsp','tsp','bag','box'];
      units.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = u;
        unitSelect.appendChild(opt);
      });

      // quantity input
      const qtyInput = document.createElement('input');
      qtyInput.type = 'number';
      qtyInput.name = 'ingQty[]';
      qtyInput.step = '0.01';
      qtyInput.min = '0';
      qtyInput.placeholder = 'Qty';

      // note field
      const noteInput = document.createElement('input');
      noteInput.type = 'text';
      noteInput.name = 'ingNote[]';
      noteInput.placeholder = 'note';

      // remove button
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'remove-ing';
      removeBtn.innerHTML = '<i class="fas fa-times-circle"></i>';
      removeBtn.onclick = function() { removeIngredient(removeBtn); };

      newRow.appendChild(ingName);
      newRow.appendChild(unitSelect);
      newRow.appendChild(qtyInput);
      newRow.appendChild(noteInput);
      newRow.appendChild(removeBtn);

      container.appendChild(newRow);
      ingredientIndex++;
    }

    function removeIngredient(btn) {
      // 'btn' is the button element inside the row
      const row = btn.closest('.ingredient-row');
      if (row) {
        // optional: prevent removing if it's the last row? we allow but at least one row should remain? we'll keep it free
        if (document.querySelectorAll('.ingredient-row').length <= 1) {
          alert("At least one ingredient row is required. Add a new one if you want to remove this.");
          return;
        }
        row.remove();
      }
    }

    // attach event to "add ingredient" button
    document.getElementById('addIngBtn').addEventListener('click', addIngredientRow);

    // optional: ensure at least one row on reset (but reset doesn't delete dom rows). fine.
    // also for clear/reset we keep the dynamic rows but clear values? The reset button type="reset" will reset form to initial state.
    // we need to make sure initial state is like one row with empty values? but we pre-filled example.
    // we'll override reset slightly to keep at least one row but reset form values. but browser handles reset on form.
    // for better UX, we can keep one row. if users remove all they can add again.
  </script>
</body>
</html>
