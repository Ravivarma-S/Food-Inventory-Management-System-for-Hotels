<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRestaurant · add stock</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f5fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    /* subtle animated background orbs (same family) */
    body::before {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 30% 30%, #ff6b35, #ffa05e);
      top: -60px;
      left: -60px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      animation: orbMove 16s infinite alternate;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at 70% 80%, #4a90e2, #a855f7);
      bottom: -80px;
      right: -70px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.2;
      animation: orbMove2 20s infinite alternate;
      z-index: 0;
    }

    @keyframes orbMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.3); }
    }
    @keyframes orbMove2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-70px, -20px) scale(1.4); }
    }

    /* main card */
    .stock-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 70px 24px 70px 24px;
      box-shadow: 0 40px 70px -20px #00000080, 0 0 0 1px rgba(255, 107, 53, 0.3);
      width: 100%;
      max-width: 750px;
      z-index: 10;
      position: relative;
      overflow: hidden;
      animation: cardGlide 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
      padding: 0;
      border: 1px solid rgba(255, 107, 53, 0.4);
    }

    @keyframes cardGlide {
      0% { opacity: 0; transform: scale(0.94) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* header with back button + title */
    .stock-header {
      background: linear-gradient(105deg, #0b1725, #162433);
      padding: 28px 35px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 2px solid #ff6b35;
    }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid #ff6b35;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 10px 25px 10px 18px;
      border-radius: 50px 12px 50px 12px;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    .back-btn i {
      font-size: 1.3rem;
      color: #ffb347;
    }

    .back-btn:hover {
      background: #ff6b35;
      border-color: white;
      transform: translateX(-5px);
    }
    .back-btn:hover i {
      color: white;
    }

    .stock-header h2 {
      color: white;
      font-size: 2.2rem;
      font-weight: 700;
      margin-left: auto;
      letter-spacing: -0.5px;
    }
    .stock-header h2 i {
      color: #ffb347;
      margin-right: 12px;
    }

    /* form container */
    .form-container {
      padding: 45px 50px 50px;
      background: #ffffffd9;
    }

    /* two column grid for form */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px 30px;
    }

    .full-width {
      grid-column: span 2;
    }

    .input-group {
      position: relative;
      margin-bottom: 8px;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .input-group label i {
      color: #ff6b35;
      width: 24px;
      margin-right: 5px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 14px 20px 14px 50px;
      border: 2px solid #e2e8f0;
      border-radius: 40px 12px 40px 12px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      transition: all 0.2s ease;
      outline: none;
    }

    .input-group textarea {
      padding: 14px 20px 14px 50px;
      resize: vertical;
      min-height: 90px;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 44px;
      color: #ff6b35;
      font-size: 1.2rem;
      z-index: 2;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 5px #ff6b3520, 0 8px 12px -10px black;
      transform: scale(1.01);
    }

    /* quantity with unit inline (custom) */
    .quantity-hint {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .unit-badge {
      background: #f1f5f9;
      border-radius: 30px;
      padding: 5px 22px;
      font-weight: 600;
      color: #ff6b35;
      border: 1px dashed #ff6b35;
      font-size: 0.9rem;
    }

    /* checkbox / toggle for alert */
    .alert-toggle {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 16px 22px;
      border-radius: 50px 10px 50px 10px;
      border-left: 5px solid #ff6b35;
      margin: 20px 0 15px;
    }

    .alert-toggle input {
      width: 22px;
      height: 22px;
      accent-color: #ff6b35;
    }

    .alert-toggle label {
      font-weight: 600;
      color: #0f172a;
    }

    /* action buttons row */
    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 35px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .clear-btn {
      background: transparent;
      border: 2px solid #cbd5e1;
      padding: 15px 35px;
      border-radius: 60px 12px 60px 12px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #334155;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clear-btn:hover {
      background: #f1f5f9;
      border-color: #ff6b35;
      color: #ff6b35;
    }

    .add-btn {
      background: linear-gradient(135deg, #ff6b35, #ff4a1c);
      border: none;
      padding: 15px 50px;
      border-radius: 60px 12px 60px 12px;
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 20px 30px -10px #ff4d2e;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .add-btn:hover {
      background: linear-gradient(145deg, #ff801f, #ff3c00);
      transform: scale(1.03) translateY(-3px);
      box-shadow: 0 28px 40px -8px #ff3c00;
    }

    .add-btn i {
      transition: transform 0.2s;
    }
    .add-btn:hover i {
      transform: translateX(5px);
    }

    /* recent stock preview (tiny extra) */
    .recent-preview {
      margin-top: 35px;
      background: #f1f6fc;
      border-radius: 50px 10px 50px 10px;
      padding: 16px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      border: 1px solid #ffb347;
    }

    .recent-preview span {
      font-weight: 600;
      color: #0f172a;
    }
    .recent-items {
      display: flex;
      gap: 12px;
      color: #ff6b35;
      font-weight: 500;
    }
    .recent-items i {
      background: #ffffff;
      padding: 8px 14px;
      border-radius: 40px;
      box-shadow: 0 5px 10px #00000010;
    }

    /* responsive */
    @media (max-width: 600px) {
      .stock-header { flex-direction: column; align-items: start; }
      .stock-header h2 { margin-left: 0; }
      .form-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      .form-container { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <div class="stock-card">
   
	<div class="stock-header">
	  <button class="back-btn" onclick="window.location.href='/back'">
	    <i class="fas fa-arrow-left"></i> Back
	  </button>
	  <h2><i class="fas fa-boxes"></i> Add New Stock</h2>
	</div>


   
	<div class="form-container">
	  <form id="addStockForm" action="/savestocks" method="post">
	    <div class="form-grid">

	      <!-- Ingredient Name -->
	      <div class="input-group full-width">
	        <label><i class="fas fa-seedling"></i> Ingredient Name *</label>
	        <i class="fas fa-seedling input-icon"></i>
	        <input type="text"
	               name="productName"
	               placeholder="Enter the product"
	               required>
	      </div>

	      <!-- Unit -->
	      <div class="input-group">
	        <label><i class="fas fa-weight-hanging"></i> Unit</label>
	        <i class="fas fa-balance-scale input-icon"></i>
	        <select name="unit" required>
	          <option value="">-- Select Unit --</option>
	          <option value="kg">kg (kilogram)</option>
	          <option value="g">g (gram)</option>
	          <option value="L">L (litre)</option>
	          <option value="ml">ml (millilitre)</option>
	          <option value="pcs">pcs (pieces)</option>
	          <option value="dozen">dozen</option>
	          <option value="box">box</option>
	          <option value="bag">bag</option>
	        </select>
	      </div>

	      <!-- Quantity -->
	      <div class="input-group">
	        <label><i class="fas fa-cubes"></i> Quantity *</label>
	        <i class="fas fa-cubes input-icon"></i>
	        <input type="number"
	               name="quantity"
	               step="0.01"
	               min="0"
	               placeholder="Enter product quantity"
	               required>
	      </div>

	      <!-- Reorder Level -->
	      <div class="input-group">
	        <label><i class="fas fa-exclamation-triangle"></i> Reorder At</label>
	        <i class="fas fa-bell input-icon"></i>
	        <input type="number"
	               name="reorderLevel"
	               step="0.1"
	               min="0"
	               placeholder="Alert Level Indicator">
	      </div>

	      <!-- Expiry Date -->
	      <div class="input-group">
	        <label><i class="fas fa-calendar-alt"></i> Expiry Date</label>
	        <i class="fas fa-calendar-alt input-icon"></i>
	        <input type="date"
	               name="expiryDate">
	      </div>

	    </div>

	    <!-- Action Buttons -->
	    <div class="action-row">
	      <button type="reset" class="clear-btn">
	        <i class="fas fa-eraser"></i> Clear
	      </button>
	      <button type="submit" class="add-btn">
	        <i class="fas fa-plus-circle"></i> Add to Stock
	      </button>
	    </div>

	  </form>
	</div>

  </div>

  <!-- extra floating helper (tiny back alternative) but back btn is main -->
  <div style="position: fixed; bottom: 20px; left: 20px; opacity:0.4;">
    <i class="fas fa-arrow-left" style="color: #ff6b35;"></i> use back button
  </div>
</body>
</html>
