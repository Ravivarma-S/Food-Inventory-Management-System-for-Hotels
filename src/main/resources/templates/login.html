<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRestaurant · login</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0c0f18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }

    /* animated gradient background with floating orbs */
    body::before {
      content: '';
      position: fixed;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle at 40% 40%, #ff6b35, #ffa75e);
      top: -80px;
      left: -80px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      animation: orbFloat 18s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle at 60% 70%, #3b82f6, #a855f7);
      bottom: -120px;
      right: -60px;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.3;
      animation: orbFloat2 22s infinite alternate;
      z-index: 0;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.4); }
    }
    @keyframes orbFloat2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-90px, -20px) scale(1.5); }
    }

    /* main login card — glassmorphism + soft borders */
    .login-wrapper {
      background: rgba(20, 28, 45, 0.7);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 70px 24px 70px 24px;
      border: 1px solid rgba(255, 107, 53, 0.35);
      box-shadow: 0 50px 80px -20px #000000cc, 0 0 0 1px rgba(255, 215, 140, 0.1);
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      z-index: 10;
      position: relative;
      animation: cardRise 0.9s cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    @keyframes cardRise {
      0% { opacity: 0; transform: scale(0.92) translateY(40px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* left panel – welcome back with chef story */
    .welcome-panel {
      flex: 1 1 360px;
      background: linear-gradient(155deg, #0e1a27, #17212f);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .welcome-panel::after {
      content: '🍜';
      font-size: 200px;
      position: absolute;
      bottom: -40px;
      right: -30px;
      opacity: 0.06;
      transform: rotate(10deg);
      pointer-events: none;
    }

    .chef-icon {
      font-size: 4rem;
      background: linear-gradient(135deg, #ffaa4e, #ff4d2e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 15px #ff6b35);
      animation: subtleWave 3s infinite;
    }

    @keyframes subtleWave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    .welcome-panel h1 {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .welcome-panel h1 span {
      background: linear-gradient(145deg, #ffb85b, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-mini {
      display: flex;
      gap: 25px;
      margin: 30px 0 20px;
    }

    .stat-item {
      background: rgba(255,255,255,0.03);
      padding: 15px 18px;
      border-radius: 30px 10px 30px 10px;
      border-left: 3px solid #ff6b35;
      backdrop-filter: blur(4px);
    }

    .stat-item .number {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(white, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .testimonial-peek {
      margin-top: 25px;
      background: rgba(0,0,0,0.3);
      padding: 18px 22px;
      border-radius: 40px 12px 40px 12px;
      border-left: 4px solid #f97316;
      font-style: italic;
      font-weight: 300;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .testimonial-peek img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #ffb347;
      object-fit: cover;
    }

    /* right panel – login form */
    .form-panel {
      flex: 1 1 420px;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(8px);
      padding: 55px 48px;
      border-radius: 50px 18px 50px 18px;
      margin: 20px;
      box-shadow: 0 20px 40px -10px #00000070;
    }

    .form-panel h2 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 5px;
    }

    .form-panel h2 i {
      color: #ff6b35;
      margin-right: 8px;
      animation: lockBob 3s infinite;
    }
    @keyframes lockBob {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-4px); }
    }

    .form-sub {
      color: #334155;
      margin-bottom: 35px;
      font-weight: 400;
      border-left: 4px solid #ff6b35;
      padding-left: 18px;
    }

    /* input groups with icon styling */
    .input-group {
      margin-bottom: 28px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-group label i {
      color: #ff6b35;
      width: 24px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 24px 16px 54px;
      border: 2px solid #e2e8f0;
      border-radius: 50px 12px 50px 12px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      transition: all 0.25s ease;
      outline: none;
    }

    .input-icon {
      position: absolute;
      left: 22px;
      top: 50px;
      color: #ff6b35;
      font-size: 1.3rem;
      z-index: 2;
    }

    .input-group input:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 6px #ff6b3520, 0 12px 20px -16px black;
      transform: scale(1.01);
    }

    /* extras: remember me + forgot */
    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin: 15px 0 28px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
      font-weight: 500;
    }
    .remember input {
      width: 18px;
      height: 18px;
      accent-color: #ff6b35;
    }

    .forgot-link {
      color: #ff6b35;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .forgot-link:hover {
      border-bottom-color: #ff6b35;
    }

    /* login button — juicy */
    .login-btn {
      background: linear-gradient(135deg, #ff6b35, #ff4a1c);
      border: none;
      padding: 18px 28px;
      width: 100%;
      border-radius: 60px 16px 60px 16px;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 25px 40px -12px #ff4d2e;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .login-btn:hover {
      transform: scale(1.02) translateY(-5px);
      background: linear-gradient(145deg, #ff801f, #ff3c00);
      box-shadow: 0 35px 50px -8px #ff3c00;
    }

    .login-btn i {
      transition: transform 0.2s;
    }
    .login-btn:hover i {
      transform: translateX(8px);
    }

    .register-prompt {
      text-align: center;
      margin-top: 28px;
      color: #334155;
    }

    .register-prompt a {
      color: #ff6b35;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .register-prompt a:hover {
      border-bottom-color: #ff6b35;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 30px;
      color: #475569;
      font-size: 0.8rem;
      border-top: 1px dashed #ccc;
      padding-top: 20px;
    }
    .secure-badge i {
      color: #ffb347;
    }

    /* demo credentials hint (animated) */
    .demo-hint {
      background: rgba(255,107,53,0.08);
      border-radius: 50px 8px 50px 8px;
      padding: 12px 18px;
      margin-bottom: 20px;
      border: 1px dashed #ff6b35;
      color: #2d3a4f;
      font-size: 0.9rem;
      display: flex;
      gap: 8px;
      animation: glowHint 2.5s infinite alternate;
    }
    @keyframes glowHint {
      0% { border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.02); }
      100% { border-color: #ff6b35; background: rgba(255,107,53,0.1); }
    }

    /* responsive */
    @media (max-width: 800px) {
      .login-wrapper { flex-direction: column; margin: 15px; }
      .welcome-panel { padding: 40px 25px; }
      .form-panel { padding: 40px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- left side: vibrant welcome panel -->
    <div class="welcome-panel">
      <div class="chef-icon">
        <i class="fas fa-hat-chef fa-beat-fade" style="--fa-beat-fade-opacity: 0.8;"></i>
      </div>
      <h1>welcome back, <span>chef</span></h1>
      <p style="font-weight: 300; opacity: 0.9; margin-bottom: 20px;">ready to manage your kitchen inventory?</p>

     

   
      <div style="margin-top: 25px; display: flex; gap: 12px; font-size: 0.85rem; color: #aaa;">
        <span><i class="fa-regular fa-circle-check" style="color: #22c55e;"></i> real‑time</span>
        <span><i class="fa-regular fa-bell" style="color: #ffb347;"></i> low‑stock alerts</span>
      </div>
    </div>

    
    <div class="form-panel">
      <h2><i class="fas fa-lock"></i> Restaurent Login</h2>
      <div class="form-sub">access your restaurant dashboard</div>

    

      <form action="/accesslogin" method="post">
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> email *</label>
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" placeholder="Enter Email Address" name="email"  required>
        </div>

        <div class="input-group">
          <label><i class="fas fa-key"></i> password *</label>
          <i class="fas fa-lock input-icon"></i>
          <input type="password" placeholder="Enter Password" name="password"  required>
        </div>

       

        <!-- login button with icon -->
        <button type="submit" class="login-btn">
          <span>log in securely</span>
          <i class="fas fa-arrow-right-to-bracket"></i>
        </button>

        <div class="register-prompt">
          new to SmartRestaurant? <a href="/restaurentregister">create account →</a>
        </div>

       
      </form>

      
    </div>
  </div>

  <!-- floating decoration: tiny chef knife (purely aesthetic) -->
  <div style="position: fixed; bottom: 15px; right: 25px; color: rgba(255,255,255,0.08); font-size: 4rem; rotate: 15deg; z-index: 1; pointer-events: none;">
    <i class="fas fa-kitchen-set"></i>
  </div>
</body>
</html>
