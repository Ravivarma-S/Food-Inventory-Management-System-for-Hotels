<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRestaurant · register</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0d121f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }

    /* animated background gradient orbs */
    body::before {
      content: '';
      position: fixed;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 30% 30%, #ff6b35, #ffa05e);
      top: -50px;
      left: -50px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: floatOrb 16s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at 70% 80%, #4a90e2, #a95eff);
      bottom: -100px;
      right: -50px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.35;
      animation: floatOrb2 20s infinite alternate;
      z-index: 0;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(70px, 50px) scale(1.3); }
    }
    @keyframes floatOrb2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-80px, -30px) scale(1.4); }
    }

    /* main register card */
    .register-wrapper {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 60px 20px 60px 20px;
      border: 1px solid rgba(255, 107, 53, 0.4);
      box-shadow: 0 40px 70px -10px #00000080, 0 0 0 1px rgba(255,255,240,0.05);
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      z-index: 10;
      position: relative;
      animation: cardAppear 0.9s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes cardAppear {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* left panel – branding & illustration */
    .brand-panel {
      flex: 1 1 380px;
      background: linear-gradient(145deg, #0b1625, #131e30);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::after {
      content: '🍽️';
      font-size: 160px;
      position: absolute;
      bottom: -20px;
      right: -20px;
      opacity: 0.06;
      transform: rotate(-10deg);
      pointer-events: none;
    }

    .brand-icon {
      font-size: 4.2rem;
      background: linear-gradient(135deg, #ff9f4b, #ff4d2e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      margin-bottom: 25px;
      filter: drop-shadow(0 0 15px #ff6b35);
    }

    .brand-panel h1 {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 15px;
    }

    .brand-panel h1 span {
      background: linear-gradient(145deg, #ffb347, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-features {
      margin: 30px 0 20px;
      list-style: none;
    }

    .brand-features li {
      margin: 18px 0;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      animation: slideIn 0.5s both;
      animation-delay: calc(0.1s * var(--i));
    }

    .brand-features li i {
      color: #ff6b35;
      font-size: 1.6rem;
      width: 30px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .testimonial-mini {
      margin-top: 30px;
      background: rgba(255,255,255,0.04);
      padding: 20px 25px;
      border-radius: 50px 20px 50px 20px;
      border-left: 4px solid #ff6b35;
      font-style: italic;
      font-weight: 300;
      backdrop-filter: blur(4px);
    }

    /* right panel – registration form */
    .form-panel {
      flex: 1 1 460px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 50px 48px;
      border-radius: 40px 20px 40px 20px;
      margin: 20px;
      box-shadow: 0 20px 40px -10px #00000050;
    }

    .form-panel h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .form-panel h2 i {
      color: #ff6b35;
      margin-right: 8px;
    }

    .form-sub {
      color: #334155;
      margin-bottom: 35px;
      font-weight: 400;
      border-left: 4px solid #ff6b35;
      padding-left: 16px;
    }

    /* form row grid */
    .form-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .input-group {
      flex: 1 1 200px;
      margin-bottom: 22px;
      position: relative;
    }

    .input-group.full-width {
      flex: 1 1 100%;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1e293b;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .input-group label i {
      color: #ff6b35;
      width: 22px;
    }

    .input-group input, 
    .input-group select {
      width: 100%;
      padding: 15px 20px 15px 50px;
      border: 2px solid #e2e8f0;
      border-radius: 40px 12px 40px 12px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      transition: all 0.25s ease;
      outline: none;
    }

    .input-group select {
      padding-left: 50px;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23ff6b35' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 16px;
    }

    /* icon inside input */
    .input-icon {
      position: absolute;
      left: 20px;
      top: 42px;
      color: #ff6b35;
      font-size: 1.2rem;
      z-index: 2;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 5px #ff6b3520, 0 8px 15px -8px #000;
      transform: scale(1.02);
    }

    /* password strength dummy */
    .pass-strength {
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      margin: 8px 0 5px;
      overflow: hidden;
    }

    .pass-strength-bar {
      width: 60%;
      height: 6px;
      background: linear-gradient(90deg, #ffb347, #ff6b35);
      border-radius: 10px;
      animation: loadingWidth 1.2s ease;
    }

    @keyframes loadingWidth {
      0% { width: 0%; }
    }

    .terms {
      margin: 25px 0 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .terms input {
      width: 20px;
      height: 20px;
      accent-color: #ff6b35;
    }

    .terms a {
      color: #ff6b35;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted;
    }

    .register-btn {
      background: linear-gradient(135deg, #ff6b35, #ff4a1c);
      border: none;
      padding: 18px 30px;
      width: 100%;
      border-radius: 60px 16px 60px 16px;
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 25px 35px -12px #ff4d2e;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .register-btn:hover {
      transform: scale(1.03) translateY(-5px);
      background: linear-gradient(145deg, #ff801f, #ff3c00);
      box-shadow: 0 35px 45px -8px #ff3c00;
    }

    .register-btn i {
      transition: transform 0.2s;
    }
    .register-btn:hover i {
      transform: translateX(7px);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      color: #334155;
    }

    .login-link a {
      color: #ff6b35;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .login-link a:hover {
      border-bottom-color: #ff6b35;
    }

    /* small pulse on icon */
    .pulse-icon {
      animation: iconPulse 2s infinite;
    }

    @keyframes iconPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); text-shadow: 0 0 10px #ff9f4b; }
    }

    /* responsive */
    @media (max-width: 780px) {
      .register-wrapper { flex-direction: column; margin: 10px; }
      .brand-panel { padding: 40px 25px; }
      .form-panel { padding: 35px 25px; }
    }
  </style>
</head>
<body>
  <div class="register-wrapper">
   
    <div class="brand-panel">
      <div class="brand-icon">
        <i class="fas fa-utensils fa-beat-fade" style="--fa-beat-fade-opacity: 0.8; --fa-beat-fade-scale: 0.9;"></i>
      </div>
      <h1>Welcome to <span>smart<br>Restaurant</span></h1>
      <p style="font-weight: 300; opacity: 0.9; margin-bottom: 20px;">join the automated kitchen revolution</p>

      <ul class="brand-features" style="--i:1;">
        <li style="--i:1;"><i class="fa-regular fa-clock"></i> real‑time stock sync</li>
        <li style="--i:2;"><i class="fa-solid fa-cart-flatbed"></i> auto ingredient deduction</li>
        <li style="--i:3;"><i class="fa-solid fa-chart-simple"></i> low‑stock AI alerts</li>
        <li style="--i:4;"><i class="fa-solid fa-mobile-screen"></i> billing & inventory on‑the‑go</li>
      </ul>

     
    </div>

    <!-- right side: registration form with animated inputs -->
    <div class="form-panel">
      <h2><i class="fas fa-pen-to-square pulse-icon"></i> Restaurent Register</h2>
     

      <form action="savehotelregister" method="post">
       
        <div class="form-row">
          <div class="input-group">
            <label><i class="fas fa-user"></i> full name *</label>
            <i class="fas fa-user input-icon"></i>
            <input type="text" placeholder="Enter Full Name" name="fullname" required>
          </div>

		  <div class="input-group">
		             <label><i class="fas fa-envelope"></i> email *</label>
		             <i class="fas fa-envelope input-icon"></i>
		             <input type="email" placeholder="Enter Email Address" name="email" required>
		           </div>
        </div>

       
        <div class="form-row">
			<div class="input-group">
			           <label><i class="fas fa-store"></i> restaurant / brand *</label>
			           <i class="fas fa-store input-icon"></i>
			           <input type="text" placeholder="Enter Restaurent Name" name="brand" required>
			         </div>

          <div class="input-group">
            <label><i class="fas fa-phone-alt"></i> phone</label>
            <i class="fas fa-phone-alt input-icon"></i>
            <input type="tel" placeholder="Enter Contact Details" name="contact" required>
          </div>
        </div>

      
      
      
        <div class="input-group full-width">
          <label><i class="fas fa-lock"></i> password *</label>
          <i class="fas fa-lock input-icon"></i>
          <input type="password" placeholder="Enter Password" name="password" required>
             </div>

      

        <!-- terms and conditions -->
        <div class="terms">
          <input type="checkbox" id="termsCheck" checked>
          <label for="termsCheck">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a> including restaurant data processing.</label>
        </div>

        <!-- submit button with animation -->
        <button type="submit" class="register-btn">
          <span>register now</span> 
          <i class="fas fa-arrow-right-long"></i>
        </button>

        <div class="login-link">
          already have an account? <a href="/restaurentlogin">sign in →</a>
        </div>

             </form>
    </div>
  </div>

  <!-- floating animated decoration (tiny chef hat) -->
  <div style="position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.1); font-size: 3rem; rotate: -10deg; z-index: 1; pointer-events: none;">
    <i class="fas fa-hat-chef"></i>
  </div>
</body>
</html>
