<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartRestaurant · view stocks</title>

    <!-- Google Fonts + Font Awesome 6 (matching theme) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap (keep for table structure, but we'll override heavily) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f5fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* animated background orbs (same as add-stock theme) */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #ff6b35, #ffa05e);
            top: -60px;
            left: -60px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: orbMove 16s infinite alternate;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 70% 80%, #4a90e2, #a855f7);
            bottom: -80px;
            right: -70px;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.2;
            animation: orbMove2 20s infinite alternate;
            z-index: 0;
        }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.3); }
        }
        @keyframes orbMove2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-70px, -20px) scale(1.4); }
        }

        /* main card – exactly like add-stock card but wider for table */
        .inventory-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 70px 24px 70px 24px;
            box-shadow: 0 40px 70px -20px #00000080, 0 0 0 1px rgba(255, 107, 53, 0.3);
            width: 100%;
            max-width: 1400px;
            z-index: 10;
            position: relative;
            overflow: hidden;
            animation: cardGlide 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
            border: 1px solid rgba(255, 107, 53, 0.4);
        }

        @keyframes cardGlide {
            0% { opacity: 0; transform: scale(0.94) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* header with back button + title – exact copy from add-stock */
        .stock-header {
            background: linear-gradient(105deg, #0b1725, #162433);
            padding: 20px 35px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #ff6b35;
        }

        .back-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid #ff6b35;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 10px 25px 10px 18px;
            border-radius: 50px 12px 50px 12px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .back-btn i {
            font-size: 1.3rem;
            color: #ffb347;
        }

        .back-btn:hover {
            background: #ff6b35;
            border-color: white;
            transform: translateX(-5px);
        }
        .back-btn:hover i {
            color: white;
        }

        .stock-header h2 {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-left: auto;
            letter-spacing: -0.5px;
        }
        .stock-header h2 i {
            color: #ffb347;
            margin-right: 12px;
        }

        /* container for table & search (similar to form-container but adjusted) */
        .table-container {
            padding: 35px 40px 45px;
            background: #ffffffd9;
        }

        /* search row – flex between title and search */
        .search-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #ff6b35, #ffa75e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .search-box {
            border-radius: 50px 12px 50px 12px;
            padding: 12px 25px;
            border: 2px solid #ff6b35;
            font-family: 'Poppins', sans-serif;
            min-width: 280px;
            background: white;
            box-shadow: 0 4px 12px #ff6b3520;
            transition: 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #ff4a1c;
            box-shadow: 0 0 0 5px #ff6b3530;
            transform: scale(1.01);
        }

        /* bootstrap table override with theme */
        .table {
            border-radius: 40px 20px 40px 20px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px #00000020;
        }

        .table thead {
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
            font-weight: 600;
        }

        .table thead th {
            border: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 18px 12px;
        }

        .table tbody tr {
            transition: background 0.2s;
        }

        .table tbody tr:hover {
            background: #fff1e6 !important;
        }

        /* low stock row highlight (keep original) */
        .low-stock {
            background-color: #ffe5e5 !important;
            font-weight: bold;
            color: #d60000;
        }

        /* badges consistent with theme */
        .badge.bg-danger {
            background: #ff4d2e !important;
            border-radius: 30px;
            padding: 6px 14px;
            font-weight: 500;
        }

        .badge.bg-success {
            background: #28a745 !important;
            border-radius: 30px;
            padding: 6px 14px;
            font-weight: 500;
        }

        /* edit / delete buttons – attractive redesign */
        .btn-edit {
            background: #ffb347;
            color: #0f172a;
            border-radius: 40px 8px 40px 8px;
            padding: 6px 16px;
            border: none;
            font-weight: 600;
            transition: 0.2s;
            margin-right: 6px;
            border: 1px solid transparent;
        }

        .btn-edit:hover {
            background: #ffa01c;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 12px #ffb34780;
            border-color: white;
        }

        .btn-delete {
            background: #ff4d2e;
            color: white;
            border-radius: 40px 8px 40px 8px;
            padding: 6px 16px;
            border: none;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .btn-delete:hover {
            background: #e03a1e;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 12px #ff4d2e80;
            border-color: #fff3e0;
        }

        .btn i {
            margin-right: 4px;
        }

        /* empty state */
        .empty-message {
            padding: 50px;
            font-size: 1.2rem;
            color: #64748b;
            background: #f8fafc;
            border-radius: 60px 20px 60px 20px;
            border: 1px dashed #ff6b35;
        }

        /* responsive */
        @media (max-width: 700px) {
            .stock-header { flex-direction: column; align-items: start; }
            .stock-header h2 { margin-left: 0; }
            .table-container { padding: 25px 15px; }
            .search-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="inventory-card">

    <!-- header with back button (exact same as add-stock page) -->
    <div class="stock-header">
        <button class="back-btn" onclick="window.location.href='/back'">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <h2><i class="fas fa-warehouse"></i> Stock Monitor</h2>
    </div>

    <!-- table area -->
    <div class="table-container">

        <!-- search and title row (keeping original search functionality) -->
        <div class="search-row">
            <h3 class="table-title"><i class="fas fa-clipboard-list"></i> current inventory</h3>
            <input type="text" id="searchInput"
                   class="search-box"
                   placeholder="🔍 Search ingredient...">
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle" id="stockTable">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Unit</th>
                    <th>Quantity</th>
                    <th>Reorder Level</th>
                    <th>Expiry</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="stock, iterStat : ${stocks}"
                    th:with="qty=${T(java.lang.Double).parseDouble(stock.quantity)},
                             reorder=${T(java.lang.Double).parseDouble(stock.reorderLevel)}"
                    th:classappend="${qty <= reorder} ? 'low-stock'">

                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${stock.productName}"></td>
                    <td th:text="${stock.unit}"></td>

                    <!-- Quantity with low badge -->
                    <td>
                        <span th:text="${qty}"></span>
                        <span th:if="${qty <= reorder}"
                              class="badge bg-danger ms-1">
                            Low
                        </span>
                    </td>

                    <td th:text="${reorder}"></td>

                    <td th:text="${stock.expiryDate}"></td>

                    <!-- Status badges (original logic) -->
                    <td>
                        <span th:if="${qty <= reorder}"
                              class="badge bg-danger">
                            ⚠ Reorder Now
                        </span>
                        <span th:if="${qty > reorder}"
                              class="badge bg-success">
                            In Stock
                        </span>
                    </td>

                    <!-- Actions with attractive buttons (edit/delete) -->
                    <td>
                        <a th:href="@{/edit/{id}(id=${stock.id})}"
                           class="btn btn-edit btn-sm">
                            <i class="fas fa-edit"></i> Edit
                        </a>

                        <a th:href="@{/delete/{id}(id=${stock.id})}"
                           class="btn btn-delete btn-sm"
                           onclick="return confirm('Are you sure to delete?')">
                            <i class="fas fa-trash"></i> Del
                        </a>
                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(stocks)}">
                    <td colspan="8" class="text-center empty-message">
                        <i class="fas fa-box-open" style="font-size: 2rem; opacity: 0.5;"></i> <br>
                        No Stocks Available
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

        <!-- subtle recent / hint (just for style) -->
        <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px; color: #64748b;">
            <span><i class="fas fa-circle-check" style="color: #22c55e;"></i> auto updates</span>
            <span><i class="fas fa-bell" style="color: #ff6b35;"></i> low stock monitor</span>
        </div>

    </div>
</div>

<!-- original search script (unchanged) -->
<script>
    document.getElementById("searchInput").addEventListener("keyup", function () {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#stockTable tbody tr");

        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
</script>

<!-- floating helper (same as add-stock) -->
<div style="position: fixed; bottom: 20px; left: 20px; opacity:0.4;">
    <i class="fas fa-arrow-left" style="color: #ff6b35;"></i> use back button
</div>

</body>
</html>
